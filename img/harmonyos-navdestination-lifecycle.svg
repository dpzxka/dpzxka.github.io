<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffa94d"/>
    </linearGradient>
    <linearGradient id="phaseCreate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d7ff9"/>
      <stop offset="100%" stop-color="#1a5fc7"/>
    </linearGradient>
    <linearGradient id="phaseShow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00a884"/>
    </linearGradient>
    <linearGradient id="phaseHide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffa94d"/>
      <stop offset="100%" stop-color="#e88a2a"/>
    </linearGradient>
    <linearGradient id="phaseDestroy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d94f4f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8899bb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8edf5" text-anchor="middle" filter="url(#glow)">NavDestination 生命周期时序全景</text>

  <!-- Timeline horizontal -->
  <line x1="60" y1="70" x2="760" y2="70" stroke="#2a2f4a" stroke-width="2"/>
  <text x="60" y="62" font-family="monospace" font-size="10" fill="#667799">t</text>

  <!-- Phase blocks on timeline -->
  <!-- Create -->
  <rect x="80" y="55" width="140" height="18" rx="9" fill="url(#phaseCreate)" opacity="0.9"/>
  <text x="150" y="67" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">创建阶段 (Create)</text>

  <!-- Show -->
  <rect x="240" y="55" width="140" height="18" rx="9" fill="url(#phaseShow)" opacity="0.9"/>
  <text x="310" y="67" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">显示阶段 (Show)</text>

  <!-- Visible -->
  <rect x="400" y="55" width="100" height="18" rx="9" fill="#3a4a6a" opacity="0.9"/>
  <text x="450" y="67" font-family="system-ui" font-size="10" fill="#aabbdd" text-anchor="middle" font-weight="600">可见中</text>

  <!-- Hide -->
  <rect x="520" y="55" width="120" height="18" rx="9" fill="url(#phaseHide)" opacity="0.9"/>
  <text x="580" y="67" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">隐藏阶段 (Hide)</text>

  <!-- Destroy -->
  <rect x="660" y="55" width="90" height="18" rx="9" fill="url(#phaseDestroy)" opacity="0.9"/>
  <text x="705" y="67" font-family="system-ui" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">销毁阶段</text>

  <!-- === Lifecycle flow diagram === -->

  <!-- Section: 创建阶段 -->
  <text x="80" y="110" font-family="system-ui" font-size="13" font-weight="700" fill="#5b8dee">创建阶段</text>

  <!-- Callback boxes -->
  <rect x="80" y="122" width="130" height="28" rx="6" fill="#1a2245" stroke="#2d7ff9" stroke-width="1"/>
  <text x="145" y="140" font-family="monospace" font-size="11" fill="#7ab4ff" text-anchor="middle">aboutToAppear</text>

  <text x="225" y="140" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="250" y="122" width="130" height="28" rx="6" fill="#1a2245" stroke="#2d7ff9" stroke-width="1"/>
  <text x="315" y="140" font-family="monospace" font-size="11" fill="#7ab4ff" text-anchor="middle">onWillAppear</text>

  <text x="395" y="140" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="420" y="122" width="130" height="28" rx="6" fill="#1a2245" stroke="#2d7ff9" stroke-width="1"/>
  <text x="485" y="140" font-family="monospace" font-size="11" fill="#7ab4ff" text-anchor="middle">onAppear</text>

  <text x="565" y="140" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="590" y="122" width="130" height="28" rx="6" fill="#1a2245" stroke="#00d4aa" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="655" y="140" font-family="monospace" font-size="11" fill="#5ddab0" text-anchor="middle">onReady</text>

  <!-- Arrow down to show phase -->
  <line x1="145" y1="150" x2="145" y2="170" stroke="#4a5a7a" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- Section: 显示阶段 -->
  <text x="80" y="190" font-family="system-ui" font-size="13" font-weight="700" fill="#3ddab0">显示阶段</text>

  <rect x="80" y="202" width="150" height="28" rx="6" fill="#1a3240" stroke="#00d4aa" stroke-width="1"/>
  <text x="155" y="220" font-family="monospace" font-size="11" fill="#5ddab0" text-anchor="middle">onWillShow</text>

  <text x="245" y="220" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="270" y="202" width="130" height="28" rx="6" fill="#1a3240" stroke="#00d4aa" stroke-width="1"/>
  <text x="335" y="220" font-family="monospace" font-size="11" fill="#5ddab0" text-anchor="middle">onShown</text>

  <!-- Visible state -->
  <rect x="440" y="202" width="100" height="28" rx="6" fill="#2a3a5a" stroke="#4a6a9a" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="490" y="220" font-family="system-ui" font-size="10" fill="#8899bb" text-anchor="middle">页面可见</text>

  <!-- Arrow right to hide -->
  <line x1="540" y1="216" x2="570" y2="216" stroke="#4a5a7a" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- Section: 隐藏阶段 -->
  <text x="600" y="190" font-family="system-ui" font-size="13" font-weight="700" fill="#f0b060">隐藏阶段</text>

  <rect x="580" y="202" width="130" height="28" rx="6" fill="#3a2a20" stroke="#ffa94d" stroke-width="1"/>
  <text x="645" y="220" font-family="monospace" font-size="11" fill="#f0b060" text-anchor="middle">onWillHide</text>

  <text x="558" y="254" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="580" y="240" width="120" height="28" rx="6" fill="#3a2a20" stroke="#ffa94d" stroke-width="1"/>
  <text x="640" y="258" font-family="monospace" font-size="11" fill="#f0b060" text-anchor="middle">onHidden</text>

  <!-- Arrow down to destroy -->
  <line x1="640" y1="268" x2="640" y2="288" stroke="#4a5a7a" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- Section: 销毁阶段 -->
  <text x="80" y="310" font-family="system-ui" font-size="13" font-weight="700" fill="#f08080">销毁阶段</text>

  <rect x="80" y="322" width="150" height="28" rx="6" fill="#3a1a1a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="155" y="340" font-family="monospace" font-size="11" fill="#f08080" text-anchor="middle">onWillDisappear</text>

  <text x="245" y="340" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="270" y="322" width="140" height="28" rx="6" fill="#3a1a1a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="340" y="340" font-family="monospace" font-size="11" fill="#f08080" text-anchor="middle">onDisappear</text>

  <text x="425" y="340" font-family="system-ui" font-size="16" fill="#4a5a7a">→</text>

  <rect x="450" y="322" width="150" height="28" rx="6" fill="#3a1a1a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="525" y="340" font-family="monospace" font-size="11" fill="#f08080" text-anchor="middle">aboutToDisappear</text>

  <!-- === Summary callbacks table at bottom === -->

  <line x1="60" y1="380" x2="760" y2="380" stroke="#2a2f4a" stroke-width="1"/>

  <!-- Legend row 1 -->
  <circle cx="80" cy="402" r="4" fill="#2d7ff9"/>
  <text x="92" y="406" font-family="system-ui" font-size="10" fill="#8899bb">自定义组件</text>
  <circle cx="210" cy="402" r="4" fill="#00d4aa"/>
  <text x="222" y="406" font-family="system-ui" font-size="10" fill="#8899bb">NavDestination 独有</text>
  <circle cx="380" cy="402" r="4" fill="#ffa94d"/>
  <text x="392" y="406" font-family="system-ui" font-size="10" fill="#8899bb">仅栈操作触发</text>
  <circle cx="520" cy="402" r="4" fill="#ff6b6b"/>
  <text x="532" y="406" font-family="system-ui" font-size="10" fill="#8899bb">通用组件</text>

  <!-- Note -->
  <text x="60" y="430" font-family="system-ui" font-size="10" fill="#556688">注意: onWillShow/onWillHide 在前台切换时不触发；onHidden/onShown 在前后台切换时触发</text>

  <!-- Key insight -->
  <text x="60" y="460" font-family="system-ui" font-size="11" fill="#7a8aaa">核心原则：</text>
  <text x="150" y="460" font-family="system-ui" font-size="11" fill="#5ddab0">onShown = 每次可见都触发(含返回) → 刷新数据的首选</text>
  <text x="60" y="480" font-family="system-ui" font-size="11" fill="#5ddab0">onReady = 仅触发一次 → 初始化参数和路由上下文的唯一选择</text>
</svg>
