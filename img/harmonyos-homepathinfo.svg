<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffa94d"/>
    </linearGradient>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2f4a"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff" letter-spacing="1">Navigation 2.0 · HomePathInfo</text>
  <text x="400" y="72" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#8890a4" letter-spacing="2">统一路由架构 · 主页 NavDestination 化</text>

  <!-- Decorative line -->
  <line x1="300" y1="85" x2="500" y2="85" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- ======================== -->
  <!-- LEFT SIDE: Traditional -->
  <!-- ======================== -->

  <!-- Traditional box -->
  <rect x="40" y="110" width="340" height="360" rx="10" fill="#13173a" stroke="#2a2f4a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="110" width="340" height="36" rx="10" fill="#1e2345"/>
  <text x="210" y="133" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#ff6b6b" font-weight="bold">传统写法 · 两套机制并存</text>

  <!-- Navigation container -->
  <rect x="60" y="160" width="300" height="290" rx="8" fill="none" stroke="#3a3f5a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="210" y="180" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#5a5f7a">Navigation 容器</text>

  <!-- NavBar / 首页区 -->
  <rect x="80" y="195" width="260" height="100" rx="6" fill="#2a1f3a" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="210" y="218" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#ff6b6b" font-weight="bold">⚠ 首页（NavBar 子组件）</text>
  <text x="210" y="238" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7a6f8a">Column / List / Grid</text>
  <text x="210" y="260" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7a6f8a">生命周期❌ 标题控制❌ 参数接收❌</text>
  <text x="210" y="280" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#5a4f6a">需借助全局 observer 实现</text>

  <!-- Arrow between areas -->
  <text x="210" y="312" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" fill="#3a3f5a">↓</text>

  <!-- NavDestination 区 -->
  <rect x="80" y="325" width="260" height="105" rx="6" fill="#1a2f3a" stroke="#00d4aa" stroke-width="1"/>
  <text x="210" y="345" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#00d4aa">✅ NavDestination（子页面）</text>
  <rect x="95" y="358" width="110" height="55" rx="4" fill="#1f3f4a" stroke="#2a5f6a" stroke-width="0.8"/>
  <text x="150" y="377" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#8ab4c4">DetailPage</text>
  <text x="150" y="393" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a8a9a">onShown ✅</text>
  <text x="150" y="406" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a8a9a">title() ✅</text>

  <rect x="215" y="358" width="110" height="55" rx="4" fill="#1f3f4a" stroke="#2a5f6a" stroke-width="0.8"/>
  <text x="270" y="377" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#8ab4c4">SettingPage</text>
  <text x="270" y="393" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a8a9a">onHidden ✅</text>
  <text x="270" y="406" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#5a8a9a">onReady ✅</text>

  <!-- ======================== -->
  <!-- RIGHT SIDE: HomePathInfo -->
  <!-- ======================== -->

  <text x="420" y="135" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#3a3f5a">→</text>

  <!-- New box -->
  <rect x="450" y="110" width="340" height="360" rx="10" fill="#0a1f2a" stroke="#00d4aa" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="110" width="340" height="36" rx="10" fill="#0f2f3a"/>
  <text x="620" y="133" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#00d4aa" font-weight="bold">新写法 · 统一 NavDestination 体系</text>

  <!-- Navigation container (new) -->
  <rect x="470" y="160" width="300" height="290" rx="8" fill="none" stroke="#2a5f6a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="180" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#3a7a8a">Navigation 容器（纯路由）</text>

  <!-- NavPathStack -->
  <rect x="490" y="195" width="260" height="30" rx="4" fill="#0f2f3a" stroke="#007aff" stroke-width="1"/>
  <text x="620" y="214" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#5a9aff">NavPathStack（唯一路由栈）</text>

  <!-- HomePathInfo highlighted -->
  <rect x="490" y="240" width="260" height="90" rx="6" fill="#0a3a2a" stroke="url(#accent)" stroke-width="2"/>
  <rect x="490" y="240" width="260" height="24" rx="6" fill="#0f4a3a"/>
  <text x="620" y="256" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#00d4aa" font-weight="bold">HomePathInfo · 主页也是 NavDestination</text>

  <text x="505" y="280" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7ab4a4">• 完整的 onShown / onHidden 生命周期</text>
  <text x="505" y="296" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7ab4a4">• 统一的 title() 和 onReady 参数接收</text>
  <text x="505" y="312" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7ab4a4">• 独立 @Component，代码可复用可拆分</text>

  <!-- Uniform NavDestinations below -->
  <text x="620" y="350" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#3a7a8a">统一管理体系</text>
  <text x="620" y="365" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" fill="#3a5f5a">↓</text>

  <rect x="490" y="375" width="80" height="55" rx="4" fill="#1a3f3a" stroke="#00d4aa" stroke-width="1"/>
  <text x="530" y="395" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7ab4a4" font-weight="bold">HomePage</text>
  <text x="530" y="410" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#4a8a7a">onShown ✅</text>
  <text x="530" y="422" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#4a8a7a">title ✅</text>

  <rect x="580" y="375" width="80" height="55" rx="4" fill="#1a3f3a" stroke="#00d4aa" stroke-width="1"/>
  <text x="620" y="395" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7ab4a4" font-weight="bold">DetailPage</text>
  <text x="620" y="410" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#4a8a7a">onShown ✅</text>
  <text x="620" y="422" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#4a8a7a">title ✅</text>

  <rect x="670" y="375" width="80" height="55" rx="4" fill="#1a3f3a" stroke="#00d4aa" stroke-width="1"/>
  <text x="710" y="395" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7ab4a4" font-weight="bold">Settings</text>
  <text x="710" y="410" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#4a8a7a">onHidden ✅</text>
  <text x="710" y="422" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#4a8a7a">title ✅</text>

  <!-- Bottom footer -->
  <text x="400" y="488" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#3a3f5a">Navigation 2.0 · API Version 20 · HarmonyOS 6.0</text>
</svg>
