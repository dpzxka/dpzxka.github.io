<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <defs>
    <linearGradient id="activeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="inactiveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="destroyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <linearGradient id="createGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1E88E5"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#43A047"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#F44336"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" rx="12" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">NavDestination 生命周期状态流转</text>

  <!-- State: Start -->
  <rect x="50" y="60" width="700" height="40" rx="6" fill="#F5F5F5" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="85" text-anchor="middle" font-size="13" fill="#666">应用启动 / pushPath 触发</text>

  <line x1="400" y1="100" x2="400" y2="120" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- State: aboutToAppear -->
  <rect x="200" y="125" width="400" height="50" rx="25" fill="url(#createGrad)" filter="url(#shadow)"/>
  <text x="400" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">aboutToAppear</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" fill="#E3F2FD">组件构建前执行，可修改状态变量</text>

  <line x1="400" y1="175" x2="400" y2="195" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- State: onWillAppear -->
  <rect x="200" y="200" width="400" height="50" rx="25" fill="url(#activeGrad)" filter="url(#shadow)"/>
  <text x="400" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">onWillAppear</text>
  <text x="400" y="240" text-anchor="middle" font-size="11" fill="#E8F5E9">组件挂载前，状态变更立即生效</text>

  <line x1="400" y1="250" x2="400" y2="270" stroke="#43A047" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- State: onShown -->
  <rect x="200" y="275" width="400" height="50" rx="25" fill="url(#activeGrad)" filter="url(#shadow)"/>
  <text x="400" y="298" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">onShown ✓</text>
  <text x="400" y="315" text-anchor="middle" font-size="11" fill="#E8F5E9">布局完成后触发，适合启动动画</text>

  <!-- Left branch: push new page → hidden -->
  <path d="M200,300 L100,300 L100,390 L200,390" fill="none" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="150" y="345" text-anchor="middle" font-size="11" fill="#FF9800" transform="rotate(-90,150,345)">pushPath 新页面</text>

  <!-- State: onHidden -->
  <rect x="200" y="365" width="400" height="50" rx="25" fill="url(#inactiveGrad)" filter="url(#shadow)"/>
  <text x="400" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">onHidden</text>
  <text x="400" y="405" text-anchor="middle" font-size="11" fill="#FFF3E0">页面被覆盖/进入后台</text>

  <!-- Right branch: pop back → shown -->
  <path d="M600,300 L700,300 L700,390 L600,390" fill="none" stroke="#43A047" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="650" y="345" text-anchor="middle" font-size="11" fill="#43A047" transform="rotate(90,650,345)">pop 返回</text>

  <!-- From hidden back to shown -->
  <path d="M400,415 L400,440" fill="none" stroke="#43A047" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="420" y="433" font-size="11" fill="#43A047">pop 从栈中顶部页面返回</text>

  <!-- Shown again -->
  <rect x="200" y="445" width="400" height="50" rx="25" fill="url(#activeGrad)" filter="url(#shadow)"/>
  <text x="400" y="468" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">onShown ✓（恢复）</text>
  <text x="400" y="485" text-anchor="middle" font-size="11" fill="#E8F5E9">页面重新显示</text>

  <!-- Destroy path -->
  <path d="M600,300 L700,300 L700,530 L600,530" fill="none" stroke="#F44336" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="650" y="415" text-anchor="middle" font-size="11" fill="#F44336" transform="rotate(90,650,415)">popToIndex / remove</text>

  <path d="M400,495 L400,520" fill="none" stroke="#F44336" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- State: onWillDisappear -->
  <rect x="200" y="525" width="400" height="40" rx="20" fill="url(#destroyGrad)" filter="url(#shadow)"/>
  <text x="400" y="550" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">onWillDisappear</text>
  <text x="400" y="563" text-anchor="middle" font-size="11" fill="#FFEBEE">销毁前执行资源释放</text>

  <!-- Footer note -->
  <text x="400" y="600" text-anchor="middle" font-size="11" fill="#999">注意：onNewParam（API 19+）在 Single 模式的已有页面收到新参数时触发</text>
</svg>
