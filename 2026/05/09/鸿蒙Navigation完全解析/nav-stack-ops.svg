<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <defs>
    <linearGradient id="stackGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="pushGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="popGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowPush" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#43A047"/>
    </marker>
    <marker id="arrowPop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="#F44336"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">路由栈操作示意 — NavPathStack 核心方法</text>

  <!-- Stack visual -->
  <text x="60" y="65" font-size="14" font-weight="bold" fill="#1565C0">栈结构</text>

  <!-- Stack frame -->
  <rect x="30" y="80" width="220" height="320" rx="6" fill="#F5F5F5" stroke="#BBDEFB" stroke-width="2"/>

  <!-- Stack items (bottom to top) -->
  <rect x="50" y="330" width="180" height="40" rx="4" fill="url(#stackGrad)" stroke="#64B5F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="355" text-anchor="middle" font-size="12" fill="#1565C0">1. Home</text>
  <line x1="50" y1="326" x2="230" y2="326" stroke="#BBDEFB" stroke-width="1"/>

  <rect x="50" y="286" width="180" height="40" rx="4" fill="url(#stackGrad)" stroke="#64B5F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="311" text-anchor="middle" font-size="12" fill="#1565C0">2. ListPage</text>
  <line x1="50" y1="282" x2="230" y2="282" stroke="#BBDEFB" stroke-width="1"/>

  <rect x="50" y="242" width="180" height="40" rx="4" fill="url(#stackGrad)" stroke="#64B5F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="267" text-anchor="middle" font-size="12" fill="#1565C0">3. Detail</text>
  <line x1="50" y1="238" x2="230" y2="238" stroke="#BBDEFB" stroke-width="1"/>

  <!-- Top of stack indicator -->
  <rect x="100" y="90" width="100" height="22" rx="11" fill="#1565C0"/>
  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#fff">← Top 栈顶</text>
  <line x1="150" y1="112" x2="150" y2="238" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Operations -->
  <text x="330" y="65" font-size="14" font-weight="bold" fill="#333">操作</text>

  <!-- pushPath -->
  <rect x="290" y="85" width="220" height="75" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">pushPath(name, param)</text>
  <text x="400" y="128" text-anchor="middle" font-size="11" fill="#555">将新页面压入栈顶</text>
  <text x="400" y="146" text-anchor="middle" font-size="11" fill="#888">例：pushPathByName('Detail', { id: 123 })</text>
  <line x1="290" y1="160" x2="510" y2="160" stroke="#A5D6A7" stroke-width="1"/>
  <line x1="510" y1="85" x2="510" y2="160" stroke="#A5D6A7" stroke-width="1"/>

  <!-- Arrow to stack -->
  <line x1="510" y1="120" x2="230" y2="260" stroke="#43A047" stroke-width="2" marker-end="url(#arrowPush)"/>

  <!-- pop -->
  <rect x="290" y="175" width="220" height="75" rx="8" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">pop()</text>
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#555">弹出栈顶页面</text>
  <text x="400" y="236" text-anchor="middle" font-size="11" fill="#888">返回上一个页面</text>

  <!-- Arrow from stack -->
  <line x1="230" y1="260" x2="290" y2="210" stroke="#F44336" stroke-width="2" marker-end="url(#arrowPop)"/>

  <!-- Other ops -->
  <rect x="290" y="265" width="220" height="115" rx="8" fill="#FFF8E1" stroke="#FFD54F" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">更多操作</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#555">popToName(name) — 回退到指定页面</text>
  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#555">popToIndex(n) — 回退到指定索引</text>
  <text x="400" y="346" text-anchor="middle" font-size="11" fill="#555">replacePath(name) — 替换栈顶页面</text>
  <text x="400" y="364" text-anchor="middle" font-size="11" fill="#555">moveToTop(name) — 将页面移到栈顶</text>

  <!-- Route map -->
  <rect x="560" y="85" width="210" height="295" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1" filter="url(#shadow)"/>
  <text x="665" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">路由映射表</text>
  <text x="665" y="128" text-anchor="middle" font-size="11" fill="#888">route_map.json</text>
  <line x1="570" y1="138" x2="760" y2="138" stroke="#CE93D8" stroke-width="1"/>

  <text x="570" y="162" font-size="10" fill="#6A1B9A" font-family="monospace">{</text>
  <text x="575" y="180" font-size="10" fill="#333" font-family="monospace">"name": "Home",</text>
  <text x="575" y="198" font-size="10" fill="#333" font-family="monospace">"pageSourceFile":</text>
  <text x="575" y="216" font-size="10" fill="#333" font-family="monospace">  "pages/Home.ets",</text>
  <text x="575" y="240" font-size="10" fill="#333" font-family="monospace">"buildFunction":</text>
  <text x="575" y="258" font-size="10" fill="#333" font-family="monospace">  "homeBuilder"</text>
  <text x="570" y="276" font-size="10" fill="#6A1B9A" font-family="monospace">},</text>
  <text x="575" y="294" font-size="10" fill="#333" font-family="monospace">// ... 更多页面</text>
  <text x="570" y="318" font-size="10" fill="#6A1B9A" font-family="monospace">"pages": [...]</text>

  <text x="665" y="365" text-anchor="middle" font-size="11" fill="#888">pushPath 通过 name 找到对应页面</text>
</svg>
